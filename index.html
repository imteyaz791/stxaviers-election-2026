<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>St. Xavier's School — Student Council Election</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1e3a8a;--navy2:#1d4ed8;--navy3:#3b82f6;
  --gold:#f59e0b;--gold2:#fbbf24;
  --red:#dc2626;--red2:#ef4444;--green:#16a34a;--green2:#22c55e;
  --bg:#f0f4ff;--bg2:#e4eaff;--bg3:#d6deff;
  --card:#ffffff;--text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --border:rgba(30,58,138,0.13);--border2:rgba(30,58,138,0.22);
  --shadow:0 2px 14px rgba(30,58,138,0.10);
}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0a0f2e 0%,#1e3a8a 55%,#1e40af 100%);border-bottom:3px solid var(--gold);position:relative;overflow:hidden}
.hdr-g1{position:absolute;top:-50px;right:-50px;width:220px;height:220px;background:radial-gradient(circle,rgba(245,158,11,.18),transparent 70%);pointer-events:none}
.hdr-g2{position:absolute;bottom:-60px;left:60px;width:240px;height:240px;background:radial-gradient(circle,rgba(59,130,246,.12),transparent 70%);pointer-events:none}
.hdr-in{position:relative;z-index:2;padding:14px 24px 10px}
.hdr-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hdt{flex:1;min-width:180px}
.stitle{font-size:26px;font-weight:800;color:#e8190c;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff,0 0 14px rgba(232,25,12,.5);letter-spacing:1.5px;line-height:1.1;font-family:Georgia,serif}
.ssub2{font-size:12px;font-weight:700;color:rgba(255,255,255,.88);letter-spacing:1.2px;margin-top:1px}
.ssub{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.8px}
.hdr-right{text-align:right;flex-shrink:0}
.clk{font-size:22px;font-weight:700;color:var(--gold2);letter-spacing:2px;font-family:'Courier New',monospace}
.clkd{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}

/* NAV */
.nav{background:var(--navy);border-bottom:2px solid var(--gold);display:flex;overflow-x:auto;position:sticky;top:0;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.nav::-webkit-scrollbar{height:0}
.nb{background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.45);padding:12px 18px;font-size:12px;font-weight:700;letter-spacing:.7px;cursor:pointer;transition:all .2s;white-space:nowrap;text-transform:uppercase}
.nb:hover{color:var(--gold2);background:rgba(245,158,11,.07)}
.nb.active{color:var(--gold2);border-bottom-color:var(--gold2);background:rgba(245,158,11,.1)}

/* PAGES */
.page{display:none;min-height:440px}.page.active{display:block}
.pb{padding:20px 24px}

/* SECTION HEADING */
.sh{font-size:14px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px;margin-bottom:16px;letter-spacing:.5px;font-family:Georgia,serif;text-transform:uppercase}
.sh::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--gold),transparent)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:13px;padding-bottom:10px;border-bottom:1px solid var(--bg3)}
.cht{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:.3px;text-transform:uppercase}

/* FORMS */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.fg select{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);padding:9px 12px;font-size:13px;outline:none}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border:none;border-radius:10px;font-size:12px;font-weight:700;letter-spacing:.4px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-blue{background:var(--navy);color:#fff;box-shadow:0 2px 10px rgba(30,58,138,.25)}
.btn-blue:hover{background:var(--navy2);transform:translateY(-1px)}
</style>
</head>
<body>

  <!-- Branding Layout Header -->
  <header class="hdr">
    <div class="hdr-g1"></div>
    <div class="hdr-g2"></div>
    <div class="hdr-in">
      <div class="hdr-top">
        <div class="hdt">
          <h1 class="stitle">St. Xavier's School</h1>
          <p class="ssub2">STUDENT COUNCIL ELECTION</p>
          <p class="ssub">Live Voting Management Portal</p>
        </div>
        <div class="hdr-right">
          <div class="clk" id="live-clock">00:00:00</div>
          <div class="clkd">SYSTEM RUNNING STATUS</div>
        </div>
      </div>
    </div>
  </header>

  <!-- Sticky Route Controls Navigation -->
  <nav class="nav">
    <button id="btn-vote" class="nb active" onclick="switchPage('vote')">Cast Vote</button>
  </nav>

  <!-- Component Pages Context Area -->
  <main class="pb">
    <section id="page-vote" class="page active">
      <h2 class="sh">Submit Election Ballot</h2>
      <div class="card">
        <div class="card-hdr"><div class="cht">Voter Ballot Selection</div></div>
        <div class="fg">
          <label>Select Nominee Name</label>
          <select id="nominee-select">
            <option value="Candidate_A">Candidate A (Head Boy)</option>
            <option value="Candidate_B">Candidate B (Head Girl)</option>
          </select>
        </div>
        <button id="submit-btn" class="btn btn-blue" onclick="submitBallot()">Submit Secure Vote</button>
      </div>
    </section>
  </main>

  <!-- DIRECT GOOGLE WEB APP SERVER INTERACTION LOGIC -->
  <script>
    // Verified production deployment endpoint URL linkage mapping
    const GOOGLE_APP_URL = "https://google.com";

    // Navigation switching operations
    function switchPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + pageId).classList.add('active');
      document.getElementById('btn-' + pageId).classList.add('active');
    }

    // Submit ballot parameters execution to Google Sheets
    function submitBallot() {
  const selection = document.getElementById('nominee-select').value;
  const cleanName = selection.replace('Candidate_', 'Candidate ');
  const button = document.getElementById('submit-btn');

  // Prevent duplicate double-clicks
  button.disabled = true;
  button.innerText = "Saving Ballot Transaction...";

  // Format the data into URL parameters so 'no-cors' mode works seamlessly
  const targetUrl = GOOGLE_APP_URL + "?candidate=" + encodeURIComponent(cleanName);

  fetch(targetUrl, {
    method: "POST",
    mode: "no-cors"
  })
  .then(() => {
    alert(`Success! Your ballot for ${cleanName} has been recorded into the secure database.`);
    
    // Restore layout elements for the next student in line
    button.disabled = false;
    button.innerText = "Submit Secure Vote";
    document.getElementById('nominee-select').selectedIndex = 0;
  })
  .catch(err => {
    alert("Server Connection Timeout. Please check with your lab coordinator.");
    button.disabled = false;
    button.innerText = "Submit Secure Vote";
  });
}

    // Initialize layout status clock ticks execution loops 
    setInterval(() => {
      document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
